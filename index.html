      .wa-float { position: fixed; bottom: 20px; right: 20px; background-color: #25D366; color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 100; }

        ];

        const productGrid = document.getElementById('productGrid');
        function renderProducts() {
            productGrid.innerHTML = products.map(p => {
                let specsHTML = '';
                for(const [key, val] of Object.entries(p.specs)){ if(val) { specsHTML += `<p><b>${key}:</b> ${val}</p>`; }
                return `<div class="card" data-category="${p.category}" data-keywords="${p.keywords}"><span class="badge"></span><img src="${p.img}" class="product-img" alt="${p.name}"><div class="content"><h2>${p.name}</h2><div class="specs">${specsHTML}</div><a href="${p.link}" class="btn-shopee" target="_blank" rel="nofollow">🛒 CEK DI SHOPEE</a></div></div>`;
            }).join('');
            setBadges();
        }
        function setBadges(){
          document.querySelectorAll('.card').forEach((card, i) => {
            const p = products[i]; const badgeEl = card.querySelector('.badge'); const name = (p.name + ' + p.keywords).toLowerCase();
            if (name.includes('bpom')) { badgeEl.textContent = 'BPOM'; badgeEl.classList.add('bpom'); }
            else if (name.includes('terbaru') || name.includes('new')) { badgeEl.textContent = 'NEW ARRIVAL'; badgeEl.classList.add('new'); }
            else if (name.includes('terlaris')) { badgeEl.textContent = 'BEST SELLER'; badgeEl.classList.add('bestseller'); }
            else { badgeEl.style.display = 'none'; }
          });
        }
        const searchInput = document.getElementById('searchInput'); const noResult = document.getElementById('noResult'); const tags = document.querySelectorAll('.tag'); let activeFilter = 'all';
        function filterProducts() {
            let visibleCount = 0; const keyword = searchInput.value.toLowerCase();
            document.querySelectorAll('.card').forEach((card, i) => {
                const p = products[i]; const matchCategory = activeFilter === 'all' || p.category === activeFilter;
                const matchSearch = p.keywords.includes(keyword) || p.name.toLowerCase().includes(keyword) || keyword === '';
                if (matchCategory && matchSearch) { card.classList.remove('hide'); visibleCount++; } else { card.classList.add('hide'); }
            });
            noResult.style.display = visibleCount === 0? 'block' : 'none';
        }
        searchInput.addEventListener('input', filterProducts);
        tags.forEach(tag => { tag.addEventListener('click', () => { tags.forEach(t => t.classList.remove('active')); tag.classList.add('active'); activeFilter = tag.dataset.filter; filterProducts(); }); // <-- INI UDAH SAYA TUTUP }
        renderProducts();
    </script>
