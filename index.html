<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elegantia Store.id | Koleksi Wajib Wanita Dewasa</title>
<meta name="description" content="Koleksi Makeup BPOM Inez, Hanasui & Outfit Kekinian Kulot, Hijab Terlaris di Shopee. Cek link affiliate ELEGANTIA STORE.ID">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://adebadott-rgb.github.io/Ootd-Outfit-Viral/">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#fafafa;color:#111}
  header{position:sticky;top:0;background:#fff;border-bottom:1px solid #eee;padding:14px 16px;z-index:10}
  header h1{font-size:18px;font-weight:800}
  header p{font-size:13px;color:#666;margin-top:2px}
  .wrap{max-width:1000px;margin:0 auto;padding:16px}
  .search{margin:12px 0 16px}
  .search input{width:100%;padding:12px 14px;border:1px solid #e5e7eb;border-radius:12px;font-size:14px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  @media(min-width:768px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media(min-width:1024px){.grid{grid-template-columns:repeat(4,1fr)}}
  .card{background:#fff;border:1px solid #f0f0f0;border-radius:14px;overflow:hidden;position:relative;transition:.2s}
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.06)}
  .card img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
  .badge{position:absolute;top:8px;left:8px;padding:4px 8px;border-radius:6px;font-size:11px;font-weight:700;color:#fff;z-index:2}
  .badge.bpom{background:#2563eb}
  .badge.new{background:#16a34a}
  .badge.bestseller{background:#dc2626}
  .badge.limited{background:#f59e0b}
  .badge.sale{background:#ea580c}
  .body{padding:10px 12px}
  .name{font-size:14px;font-weight:700;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .desc{font-size:12px;color:#666;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .btn{display:block;margin-top:10px;text-align:center;background:#ee4d2d;color:#fff;text-decoration:none;font-weight:700;padding:10px;border-radius:10px;font-size:14px}
  .btn:active{opacity:.9}
  footer{padding:24px 16px;text-align:center;color:#888;font-size:12px}
</style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>Elegantia Store.id</h1>
      <p>Koleksi Wajib Wanita Dewasa | Link Affiliate Shopee</p>
    </div>
  </header>

  <main class="wrap">
    <div class="search">
      <input id="q" type="text" placeholder="Cari: hijab, kulot, blouse, cardigan...">
    </div>
    <div id="grid" class="grid"></div>
  </main>

  <footer>
    © 2026 Elegantia Store.id | Affiliate Shopee
  </footer>

<script>
const products = [
  // TEMPEL 8 PRODUK LAMA MAS DI SINI
  // Contoh format:
  // {
  //   id: 1,
  //   name: "Nama Produk 1",
  //   img: "https://linkfoto...",
  //   link: "https://s.shopee...",
  //   desc: "Deskripsi...",
  //   keywords: "kata, kunci"
  // },
];

const grid = document.getElementById('grid');
const q = document.getElementById('q');

function render(list){
  grid.innerHTML = list.map(p => `
    <div class="card" data-name="${p.name.toLowerCase()} ${p.keywords.toLowerCase()}">
      <span class="badge"></span>
      <img src="${p.img}" alt="${p.name}" loading="lazy">
      <div class="body">
        <div class="name">${p.name}</div>
        <div class="desc">${p.desc}</div>
        <a class="btn" href="${p.link}" target="_blank" rel="nofollow noopener">Cek di Shopee</a>
      </div>
    </div>
  `).join('');
  setBadges();
}

function setBadges(){
  document.querySelectorAll('.card').forEach(card => {
    const name = card.dataset.name.toLowerCase();
    const badgeEl = card.querySelector('.badge');
    if(!badgeEl) return;

    if (name.includes('bpom') || name.includes('inez') || name.includes('hanasui') || name.includes('wardah') || name.includes('emina')) {
      badgeEl.textContent = 'BPOM'; badgeEl.classList.add('bpom');
    } else if (name.includes('new') || name.includes('baru') || name.includes('2026') || name.includes('viral') || name.includes('terbaru')) {
      badgeEl.textContent = 'NEW ARRIVAL'; badgeEl.classList.add('new');
    } else if (name.includes('terlaris') || name.includes('best seller') || name.includes('laku')) {
      badgeEl.textContent = 'BEST SELLER'; badgeEl.classList.add('bestseller');
    } else if (name.includes('limited') || name.includes('edisi terbatas') || name.includes('po')) {
      badgeEl.textContent = 'LIMITED'; badgeEl.classList.add('limited');
    } else if (name.includes('sale') || name.includes('diskon') || name.includes('%')) {
      badgeEl.textContent = 'FLASH SALE'; badgeEl.classList.add('sale');
    } else {
      badgeEl.style.display = 'none';
    }
  });
}

q.addEventListener('input', () => {
  const val = q.value.toLowerCase().trim();
  const filtered = !val ? products : products.filter(p => 
    (p.name + ' + p.keywords + ' + p.desc).toLowerCase().includes(val)
  );
  render(filtered);
});

render(products);
</script>
</body>
</html>
