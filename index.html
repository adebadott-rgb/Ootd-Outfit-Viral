<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koleksi Wajib Wanita Dewasa | Elegantia Store.id</title>
    <style>
        :root { --primary: #2c3e50; --shopee: #EE4D2D; --accent: #B76E79; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; text-align: center; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        header { margin-bottom: 20px; padding-top: 10px; }
        .store-name { font-size: 0.9em; color: var(--accent); font-weight: 600; letter-spacing: 1px; margin-bottom: 5px; }
        header h1 { font-size: 1.8em; margin: 0; color: var(--primary); }
        .search-box { margin: 25px auto 15px; max-width: 500px; }
        .search-box input { width: 100%; padding: 14px 20px; border-radius: 50px; border: 2px solid #ddd; font-size: 1em; box-sizing: border-box; }
        .filter-tags { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 12px; }
        .tag { background: white; border: 1px solid #ddd; padding: 6px 14px; border-radius: 20px; font-size: 0.85em; cursor: pointer; }
        .tag.active { background: var(--accent); color: white; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); overflow: hidden; text-align: left; position: relative; }
        .card.hide { display: none; }
        .product-img { width: 100%; height: 320px; object-fit: cover; }
        .content { padding: 18px; }
        h2 { font-size: 1.15em; margin: 0 0 8px; font-weight: 700; line-height: 1.4; min-height: 48px; }
        .badge { position: absolute; top: 10px; left: 10px; padding: 4px 10px; border-radius: 20px; font-size: 0.75em; font-weight: bold; z-index: 2; color: #fff; display: none; }
        .badge.bpom { background: #2563eb; display: block; }
        .badge.new { background: #16a34a; display: block; }
        .badge.bestseller { background: #dc2626; display: block; }
        .specs { font-size: 0.85em; line-height: 1.6; color: #555; margin-bottom: 15px; }
        .specs p { margin: 3px 0; }
        .specs b { color: #333; width: 60px; display: inline-block; }
        .btn-shopee { display: block; background: var(--shopee); color: white; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; text-align: center; }
        .no-result { display: none; margin: 50px 0; color: #999; }
        .wa-float { position: fixed; bottom: 20px; right: 20px; background: #25D366; color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; text-decoration: none; z-index: 999; }
    </style>
</head>
<body>
    <div class="container">
        <header><div class="store-name">ELEGANTIA STORE.ID</div><h1>✨ KOLEKSI TERLARIS</h1></header>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Cari: lipstik, kulot, kerudung...">
            <div class="filter-tags">
                <span class="tag active" data-filter="all">Semua</span>
                <span class="tag" data-filter="lipstik">Lipstik</span>
                <span class="tag" data-filter="kulot">Kulot</span>
                <span class="tag" data-filter="kerudung">Kerudung</span>
                <span class="tag" data-filter="lainnya">Lainnya</span>
            </div>
        </div>
        <div class="product-grid" id="productGrid"></div>
        <div class="no-result" id="noResult">😅 Produk gak ada nih kak.</div>
    </div>
    <a href="https://wa.me/628886225629" class="wa-float" target="_blank">💬</a>

    <script>
        const products = [
            {id:1,category:"lipstik",keywords:"inez lipstik,bpom",img:"https://i.ibb.co.com/gFJ70V9Q/no-mark-React-Native-snapshot-image-24.png",name:"Inez Lipstik Official Store",link:"https://s.shopee.co.id/1qa2GA7zXc",specs:{"Bahan":"Creamy Matte","Warna":"12 Pilihan","BPOM":"Ada"}},
            {id:2,category:"kulot",keywords:"kulot kerja,kulot gajah,terbaru",img:"https://i.ibb.co.com/PZ8P8rG5/no-mark-React-Native-snapshot-image-16.png",name:"Celana Kulot Hommy Motif Terbaru",link:"https://s.shopee.co.id/AAF9Jse79w",specs:{"Bahan":"Cotton Blend Premium Import","Ukuran":"Allsize LP 64-110cm","Warna":"Motif Terbaru"}},
            {id:3,category:"lipstik",keywords:"lipstik ombre,hanasui",img:"https://i.ibb.co.com/XZ44898Q/no-mark-React-Native-snapshot-image-17.png",name:"Hanasui Spesial Ombre",link:"https://s.shopee.co.id/4VamaEarnF",specs:{"Bahan":"Lip Stain","Hasil":"Anti Luntur","BPOM":"Ada"}},
            {id:4,category:"kerudung",keywords:"jilbab instan,hijab",img:"https://i.ibb.co.com/gMjP0Y1C/no-mark-React-Native-snapshot-image-21.png",name:"Hijab Bergo Instan Non Ped Jilbab Hamidah",link:"https://s.shopee.co.id/1VxBqkyBhO",specs:{"Bahan":"Jersey Premium","Ukuran":"Allsize","Model":"Non Ped"}},
            {id:5,category:"lipstik",keywords:"inez lipstik,bpom",img:"https://i.ibb.co.com/qF2NS39S/no-mark-React-Native-snapshot-image-15.png",name:"Inez Color Contour Plus Lipstik 29 Warna",link:"https://s.shopee.co.id/6pyhLAmEdU",specs:{"Bahan":"Color Contour","Warna":"29 Pilihan","BPOM":"Ada"}},
            {id:6,category:"kulot",keywords:"kulot kerja,kulot gajah",img:"https://i.ibb.co.com/1GWXJf74/no-mark-React-Native-snapshot-image-20.png",name:"Celana Kulot Hommy Motif Gajah",link:"https://s.shopee.co.id/4Axx0pQulW",specs:{"Bahan":"Cotton Blend Premium Import","Ukuran":"Allsize LP 64-110cm","Warna":"Motif Gajah"}},
            {id:7,category:"lipstik",keywords:"lipstik ombre,hanasui",img:"https://i.ibb.co.com/9k17SBBz/no-mark-React-Native-snapshot-image-23.png",name:"Hanasui Spesial Instant Gloss",link:"https://s.shopee.co.id/7fXpCiDfcJ",specs:{"Bahan":"Lip Stain Gloss","Hasil":"Anti Luntur","BPOM":"Ada"}},
            {id:8,category:"kerudung",keywords:"jilbab instan,hijab karet",img:"https://i.ibb.co.com/Qv5ZsGpy/no-mark-React-Native-snapshot-image-22.png",name:"Hijab Bergo Instan Non Araya Karet Dagu",link:"https://s.shopee.co.id/9UzTNxZI18",specs:{"Bahan":"Jersey Premium","Ukuran":"Allsize","Model":"Karet Dagu"}},
            {id:9,category:"kerudung",keywords:"hijab pashmina,jumbo",img:"https://i.ibb.co.com/k20ny7pz/no-mark-React-Native-snapshot-image-25.png",name:"RESYAH HIJAB Shawl Pashmina Viscose Bamboo",link:"https://s.shopee.co.id/4qDeTbhnQe",specs:{"Bahan":"Viscose Bamboo","Ukuran":"180x70cm","Warna":"Eksklusif"}},
            {id:10,category:"lainnya",keywords:"blouse rajut,oversize",img:"https://i.ibb.co.com/Df9bTMkV/no-mark-React-Native-snapshot-image-26.png",name:"Blouse Rajut Olop Cable Oversize Tangan Panjang",link:"https://s.shopee.co.id/3B5QV9Rusx",specs:{"Bahan":"Rajut Premium","Ukuran":"Allsize LD 100cm","Panjang":"55cm"}},
            {id:11,category:"lainnya",keywords:"cardigan,basic",img:"https://i.ibb.co.com/1CxcKsc/no-mark-React-Native-snapshot-image-27.png",name:"Innara Cardigan Basic Cardigan",link:"https://s.shopee.co.id/1qa2uxY5ip",specs:{"Bahan":"Rajut Halus","Ukuran":"Allsize LD 100cm","Panjang":"60cm"}},
            {id:12,category:"kulot",keywords:"celana joging,olahraga",img:"https://i.ibb.co.com/V0N5ykCQ/no-mark-React-Native-snapshot-image-29.png",name:"Amicaa Sweatpants Loose Highwaist",link:"https://s.shopee.co.id/30m0Jk4y4I",specs:{"Bahan":"Cotton Fleece","Ukuran":"S M L XL","Model":"Highwaist"}},
            {id:13,category:"lainnya",keywords:"setelan vest,formal",img:"https://i.ibb.co.com/WpsxJ596/no-mark-React-Native-snapshot-image-28.png",name:"Setelan Vest dan Celana Wanita Formal",link:"https://s.shopee.co.id/7KuzTTOVFy",specs:{"Bahan":"Semiwoll Premium","Ukuran":"M L XL","Set":"Atasan Celana"}},
            {id:14,category:"kulot",keywords:"celana scuba,flare pants",img:"https://i.ibb.co.com/Kcgqk8d1/no-mark-React-Native-snapshot-image-30.png",name:"CF Flare Pants Scuba High Waist",link:"https://s.shopee.co.id/9pcKScKdbl",specs:{"Bahan":"Scuba Premium","Ukuran":"S M L XL","Model":"Cutbray"}}
        ];

        const productGrid = document.getElementById('productGrid');
        
        function renderProducts() {
            productGrid.innerHTML = products.map(p => {
                let specsHTML = '';
                for(const key in p.specs){ 
                    if(p.specs[key]){ 
                        specsHTML += `<p><b>${key}:</b> ${p.specs[key]}</p>`; 
                    } 
                }
                
                // Perubahan: Menyimpan data category, keywords, dan name langsung ke dalam attribute HTML (dataset)
                return `
                    <div class="card" 
                         data-category="${p.category}" 
                         data-name="${p.name.toLowerCase()}" 
                         data-keywords="${p.keywords.toLowerCase()}">
                        <span class="badge"></span>
                        <img src="${p.img}" class="product-img" alt="${p.name}">
                        <div class="content">
                            <h2>${p.name}</h2>
                            <div class="specs">${specsHTML}</div>
                            <a href="${p.link}" class="btn-shopee" target="_blank">🛒 CEK DI SHOPEE</a>
                        </div>
                    </div>`;
            }).join('');
            setBadges();
        }

        function setBadges(){
            document.querySelectorAll('.card').forEach((card)=>{
                const el = card.querySelector('.badge');
                // Mengambil data teks langsung dari elemen card itu sendiri
                const name = card.dataset.name;
                const keywords = card.dataset.keywords;
                const combinedText = name + ' ' + keywords;
                
                if(combinedText.includes('bpom')){
                    el.textContent='BPOM';
                    el.classList.add('bpom');
                } else if(combinedText.includes('terbaru')){
                    el.textContent='NEW';
                    el.classList.add('new');
                } else if(combinedText.includes('terlaris')){
                    el.textContent='BEST SELLER';
                    el.classList.add('bestseller');
                }
            });
        }

        const searchInput = document.getElementById('searchInput');
        const noResult = document.getElementById('noResult');
        const tags = document.querySelectorAll('.tag');
        let activeFilter = 'all';
        
        function filterProducts(){
            let visibleCount = 0;
            const searchKey = searchInput.value.toLowerCase().trim();
            
            document.querySelectorAll('.card').forEach((card)=>{
                const itemCategory = card.dataset.category;
                const itemName = card.dataset.name;
                const itemKeywords = card.dataset.keywords;
                
                // Logika Filter Kategori
                const matchCategory = activeFilter === 'all' || itemCategory === activeFilter;
                
                // Logika Filter Kata Kunci (Sekarang lebih aman & tidak sensitif huruf besar/kecil)
                const matchSearch = searchKey === '' || itemName.includes(searchKey) || itemKeywords.includes(searchKey);
                
                if(matchCategory && matchSearch){
                    card.classList.remove('hide');
                    visibleCount++;
                } else {
                    card.classList.add('hide');
                }
            });
            
            noResult.style.display = visibleCount === 0 ? 'block' : 'none';
        }
        
        searchInput.addEventListener('input', filterProducts);
        
        tags.forEach(tag => {
            tag.addEventListener('click', () => {
                tags.forEach(t => t.classList.remove('active'));
                tag.classList.add('active');
                activeFilter = tag.dataset.filter;
                filterProducts();
            });
        });

        // Jalankan render pertama kali
        renderProducts();
    </script>
</body>
</html>
